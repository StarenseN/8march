<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Дарина — Погружение ♡</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=Montserrat:wght@200;300&display=swap');

        :root {
            --bg: #0a0a0f;
            --gold: #c9a96e;
            --rose: #e5989b;
            --cream: #fdf8f4;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg);
            color: var(--cream);
            font-family: 'Montserrat', sans-serif;
            overflow: hidden; /* No scrollbar */
            height: 100vh;
            width: 100vw;
            perspective: 1000px;
        }

        /* --- 3D Scene --- */
        #scene {
            position: absolute;
            inset: 0;
            transform-style: preserve-3d;
            transition: transform 0.1s ease-out;
            will-change: transform;
        }

        .layer {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 80vw;
            max-width: 600px;
            transform: translate3d(-50%, -50%, var(--z));
            transform-style: preserve-3d;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }

        .layer.active {
            opacity: 1;
            pointer-events: auto;
        }

        /* --- Elements --- */
        .photo-frame {
            width: 100%;
            aspect-ratio: 4/5;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 10px;
            box-shadow: 0 30px 100px rgba(0,0,0,0.5);
            margin-bottom: 2rem;
            position: relative;
        }

        .photo-frame img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: sepia(10%) brightness(90%);
        }

        .text-overlay {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            font-size: clamp(1.2rem, 4vw, 2rem);
            line-height: 1.4;
            color: var(--rose);
            text-shadow: 0 0 20px rgba(229, 152, 155, 0.5);
        }

        /* --- HUD --- */
        .ui {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            text-align: center;
            font-size: 0.7rem;
            letter-spacing: 0.4em;
            text-transform: uppercase;
            color: var(--gold);
            opacity: 0.5;
            pointer-events: none;
        }

        .ui .arrow {
            display: block;
            font-size: 1.5rem;
            margin-top: 0.5rem;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: translateY(0); opacity: 0.3; }
            50% { transform: translateY(5px); opacity: 1; }
        }

        /* --- Dust/Stars --- */
        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.3;
        }

    </style>
</head>
<body>

    <div id="scene">
        <!-- Intro -->
        <div class="layer active" style="--z: 0">
            <h1 style="font-family: 'Playfair Display', serif; font-weight: 400; font-size: 4rem; color: var(--gold);">Дарина</h1>
            <p style="margin-top: 1rem; letter-spacing: 0.2em; opacity: 0.7;">8 МАРТА 2026</p>
            <div style="margin-top: 4rem; font-style: italic; font-size: 1.2rem;">Погрузись в нашу вселенную...</div>
        </div>
    </div>

    <div class="ui">
        Используй колесико или свайп
        <span class="arrow">↓</span>
    </div>

    <script>
        const photos = [
            { src: "assets/photo_2025-10-12_08-59-22.webp", text: "Твоя сила" },
            { src: "assets/photo_2025-10-19_09-38-15.webp", text: "Твой свет" },
            { src: "assets/photo_2025-12-25_00-41-41.webp", text: "Твое мужество" },
            { src: "assets/photo_2026-02-13_10-21-07.webp", text: "Твоя красота" },
            { src: "assets/photo_2026-02-14_14-27-42.webp", text: "Мое восхищение" }
        ];

        const scene = document.getElementById('scene');
        const layers = [];
        
        // Add layers with deep Z positioning
        photos.forEach((p, i) => {
            const layer = document.createElement('div');
            layer.className = 'layer';
            const z = -1500 * (i + 1);
            layer.style.setProperty('--z', `${z}px`);
            
            // Random jitter for organic feel
            const x = (Math.random() - 0.5) * 40;
            const y = (Math.random() - 0.5) * 40;
            layer.style.left = `calc(50% + ${x}vw)`;
            layer.style.top = `calc(50% + ${y}vh)`;

            layer.innerHTML = `
                <div class="photo-frame">
                    <img src="${p.src}" alt="">
                </div>
                <div class="text-overlay">${p.text}</div>
            `;
            scene.appendChild(layer);
            layers.push({ el: layer, z: z });
        });

        // Add stars for depth perception
        for(let i=0; i<200; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const sz = Math.random() * -10000;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.transform = `translateZ(${sz}px)`;
            scene.appendChild(star);
        }

        let currentZ = 0;
        let targetZ = 0;

        // Interaction
        window.addEventListener('wheel', (e) => {
            targetZ += e.deltaY * 2;
            if (targetZ < 0) targetZ = 0;
            const maxZ = 1500 * (photos.length + 1);
            if (targetZ > maxZ) targetZ = maxZ;
        });

        // Touch support
        let touchStartY = 0;
        window.addEventListener('touchstart', e => touchStartY = e.touches[0].clientY);
        window.addEventListener('touchmove', e => {
            const delta = touchStartY - e.touches[0].clientY;
            targetZ += delta * 5;
            touchStartY = e.touches[0].clientY;
            if (targetZ < 0) targetZ = 0;
            const maxZ = 1500 * (photos.length + 1);
            if (targetZ > maxZ) targetZ = maxZ;
        });

        // Animation Loop
        function animate() {
            currentZ += (targetZ - currentZ) * 0.1;
            scene.style.transform = `translateZ(${currentZ}px)`;

            // Fade layers based on proximity
            const allLayers = document.querySelectorAll('.layer');
            allLayers.forEach(l => {
                const layerZ = parseInt(l.style.getPropertyValue('--z'));
                const distance = Math.abs(layerZ + currentZ);
                
                if (distance < 1000) {
                    l.classList.add('active');
                    l.style.opacity = 1 - (distance / 1000);
                } else {
                    l.classList.remove('active');
                    l.style.opacity = 0;
                }
            });

            requestAnimationFrame(animate);
        }
        animate();

    </script>
</body>
</html>
